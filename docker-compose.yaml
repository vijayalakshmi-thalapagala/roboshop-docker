services:
  catalogue:
    build: ./catalogue
    image: vijayalakshmitv/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: vijayalakshmitv/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build: ./frontend
    image: vijayalakshmitv/user:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user
  mongodb:
    build: ./mongodb
    image: vijayalakshmitv/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  roboshop:
    driver: bridge
    name: roboshop
