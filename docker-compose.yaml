services:
  catalogue:
    build: ./catalogue
    image: vijayalakshmitv/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: vijayalakshmitv/user:1.0.0
    container_name: user
    depends_on:
    - redis
  cart:
    build: ./cart
    image: vijayalakshmitv/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
  shipping:
    build: ./shipping
    image: vijayalakshmitv/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql
  payment:
    build: ./payment
    image: vijayalakshmitv/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user
  frontend:
    build: ./frontend
    image: vijayalakshmitv/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
  mongodb:
    build: ./mongodb
    image: vijayalakshmitv/mongodb:1.0.0
    container_name: mongodb
    volumes: 
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data
  mysql:
    build: ./mysql
    image: vijayalakshmitv/mysql:1.0.0
    container_name: mysql 
    volumes:
    - mysql:/var/lib/mysql  
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123 
    container_name: rabbitmq   
    volumes:
    - rabbitmq:/var/lib/rabbitmq


networks:
  roboshop:
    driver: bridge
    name: roboshop

volumes:
  mongodb: # it is nothing but docker network create mongodb
  redis:
  mysql:
  rabbitmq: