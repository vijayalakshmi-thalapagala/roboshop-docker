services:
  catalogue:
    build: ./catalogue
    image: vijayalakshmitv/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  mongodb:
    build: ./mongodb
    image: vijayalakshmitv/mongodb:1.0.0
    container_name: mongodb

networks:
  roboshop:
    external: true   # tells Compose to use the existing network
    name: roboshop

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually